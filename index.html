<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menuju Idul Adha - Masjid Al Muhtadin</title>

    <meta property="og:title" content="Menuju Hari Raya Qurban - Masjid Al Muhtadin">
    <meta property="og:description" content="Mari persiapkan diri dan berqurban bersama. Lihat hitung mundur menuju 10 Dzulhijjah 1447 H.">
    <meta property="og:image" content="https://github.com/dany29326-prog/almuhtadiniduladha/blob/main/masjid_almuhtadin.webp?raw=true">
    <meta property="og:url" content="https://almuhtadindemo.musab.my.id/">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            background-image: linear-gradient(rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.25)), 
                              url('masjid_muhtadin.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 480px; 
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100vh;
        }

        /* --- TOMBOL SUARA PREMIUM --- */
        .audio-btn {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.25), rgba(212, 175, 55, 0.1));
            border: 1.5px solid #d4af37;
            color: #d4af37;
            padding: 10px 22px;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.15);
        }

        .audio-btn:hover {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.35), rgba(212, 175, 55, 0.2));
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
            transform: translateY(-1px);
        }

        .audio-btn:active {
            transform: scale(0.95);
        }

        /* --- HEADER TEKS --- */
        .header-text {
            color: #f5f0e8;
            font-size: 0.9rem;
            letter-spacing: 3px;
            margin-bottom: 25px;
            font-weight: 300;
            text-transform: uppercase;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
        }

        /* --- COUNTDOWN PREMIUM --- */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 35px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 16px;
            padding: 18px 12px;
            width: 78px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .time-box:hover {
            border-color: #d4af37;
            box-shadow: 0 8px 32px rgba(212, 175, 55, 0.15);
            transform: translateY(-2px);
        }

        .time-box .number {
            font-size: 2rem;
            font-weight: 700;
            color: #d4af37;
            display: block;
            font-family: 'Playfair Display', serif;
            line-height: 1;
        }

        .time-box .label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 8px;
            display: block;
            color: rgba(255,255,255,0.7);
            font-weight: 300;
        }

        /* --- NAMA MASJID PREMIUM --- */
        .masjid-name {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: #d4af37;
            line-height: 1.15;
            margin-bottom: 35px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
            letter-spacing: 1px;
        }

        /* --- KOTAK MENU PREMIUM --- */
        .menu-box {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 22px 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .menu-box:hover {
            background: rgba(212, 175, 55, 0.12);
            border-color: #d4af37;
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(212, 175, 55, 0.2);
        }

        .menu-box .menu-icon {
            font-size: 2rem;
            display: block;
            margin-bottom: 10px;
        }

        .menu-box .menu-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            color: #d4af37;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
        }

        /* --- FOOTER --- */
        .footer-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: #d4af37;
            margin-top: auto;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
            letter-spacing: 0.5px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <div>
            <audio id="takbirAudio" loop>
                <source src="takbiran.mp3" type="audio/mpeg">
                Browser Anda tidak mendukung elemen audio.
            </audio>

            <button id="playAudioBtn" class="audio-btn">🔊 Nyalakan Suara</button>

            <h4 class="header-text">MENUJU HARI RAYA QURBAN</h4>
            
            <div class="countdown" id="countdown">
                Memuat hitungan mundur...
            </div>
        </div>
        
        <div>
            <h1 class="masjid-name">MASJID<br>AL MUHTADIN</h1>
            
            <!-- Menu Box 1 -->
            <div class="menu-box" onclick="alert('Menu Panitia Idul Adha 1447 H')">
                <span class="menu-icon">📋</span>
                <span class="menu-title">Panitia Idul Adha 1447 H</span>
            </div>

            <!-- Menu Box 2 -->
            <a href="shohibul-qurban.html" style="text-decoration: none; display: block;">
                <div class="menu-box">
                    <span class="menu-icon">🐑</span>
                    <span class="menu-title">Daftar Shohibul Qurban 1447 H</span>
                </div>
            </a>

            <!-- Menu Box 3 -->
            <div class="menu-box" onclick="alert('Menu Laporan Keuangan Kegiatan Qurban 1447 H')">
                <span class="menu-icon">💰</span>
                <span class="menu-title">Laporan Keuangan Kegiatan Qurban 1447 H</span>
            </div>
        </div>

        <p class="footer-text">Memakmurkan Masjid dan Jamaahnya</p>
    </div>

    <script>
        // PENGATURAN SUARA
        const myAudio = document.getElementById("takbirAudio");
        const playBtn = document.getElementById("playAudioBtn");

        playBtn.addEventListener("click", function() {
            if (myAudio.paused) {
                myAudio.play();
                playBtn.innerHTML = "🔇 Matikan Suara"; 
                playBtn.style.background = "linear-gradient(135deg, rgba(212, 175, 55, 0.35), rgba(212, 175, 55, 0.2))";
            } else {
                myAudio.pause();
                playBtn.innerHTML = "🔊 Nyalakan Suara"; 
                playBtn.style.background = "linear-gradient(135deg, rgba(212, 175, 55, 0.25), rgba(212, 175, 55, 0.1))";
            }
        });

        // PENGATURAN HITUNG MUNDUR
        const targetDate = new Date("May 27, 2026 00:00:00").getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML = `
                <div class="time-box">
                    <span class="number">${days}</span>
                    <span class="label">Hari</span>
                </div>
                <div class="time-box">
                    <span class="number">${hours}</span>
                    <span class="label">Jam</span>
                </div>
                <div class="time-box">
                    <span class="number">${minutes}</span>
                    <span class="label">Menit</span>
                </div>
                <div class="time-box">
                    <span class="number">${seconds}</span>
                    <span class="label">Detik</span>
                </div>
            `;

            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("countdown").innerHTML = "<h2 style='color:#d4af37; background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); padding: 15px; border-radius: 16px; border: 1px solid rgba(212,175,55,0.3); font-family: Playfair Display, serif;'>Selamat Hari Raya Idul Adha!</h2>";
            }
        }, 1000);
    </script>
</body>
</html>
